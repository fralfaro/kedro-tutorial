# Project information
site_name: Tutorial Kedro
site_url: https://github.com/DTD-USM/kedro-tutorial
site_author: Francisco Alfaro

# Repository
repo_name: DTD-USM/kedro-tutorial
repo_url: https://github.com/DTD-USM/kedro-tutorial
edit_uri: ''

# Markdown extensions
markdown_extensions:
  - tables
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - neoteroi.cards
  - neoteroi.timeline
  - neoteroi.projects
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/neoteroi-mkdocs.css

# Theme
theme:
  name: material
  language: es
  logo: images/usm.png
  favicon: images/usm.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: black
    accent: amber
    toggle:
      icon: material/lightbulb
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: black
    accent: amber
    toggle:
      icon: material/lightbulb-outline
      name: Switch to light mode


# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fralfaro
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/fralfaro
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/faam/
    - icon: fontawesome/brands/kaggle
      link: https://www.kaggle.com/faamds
    - icon: fontawesome/brands/medium
      link: https://medium.com/@fralfaro
    - icon: fontawesome/solid/globe
      link: https://fralfaro.github.io/portfolio/

# Plugins
plugins:
  - search

# Extra javascript
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

#TOC
nav:
  - Inicio: index.md
  - Kedro Desde Cero: 01-introduccion-a-kedro.md
  - Recorrido Del Proyecto: 02-recorrido-del-proyecto.md
  - Pipelines Y Flujo: 03-pipelines-y-flujo.md
  - Catálogo Y Parámetros: 04-catalogo-y-parametros.md
  - Cómo Ejecutarlo: 05-como-ejecutarlo.md
  
